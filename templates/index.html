<!DOCTYPE html>
<html>
<head>
<title>SecureAI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin:0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f5f7fa;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card {
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 20px 50px rgba(0,0,0,0.1);
    width:350px;
    text-align:center;
}

input {
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #ddd;
    margin-top:20px;
}

.progress-circle {
    margin:20px auto;
    width:120px;
    height:120px;
    border-radius:50%;
    background:conic-gradient(#4caf50 0%, #ddd 0%);
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:bold;
}

.checklist {
    text-align:left;
    font-size:14px;
    margin-top:10px;
}

button {
    margin-top:15px;
    padding:10px;
    width:100%;
    border:none;
    border-radius:10px;
    background:black;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
<h2>SecureAI 🔐</h2>

<input type="password" id="password" placeholder="Type your password">

<div class="progress-circle" id="circle">0%</div>

<div class="checklist">
<div id="length">❌ 8+ Characters</div>
<div id="upper">❌ Uppercase</div>
<div id="lower">❌ Lowercase</div>
<div id="number">❌ Number</div>
<div id="special">❌ Special Character</div>
</div>

<p id="entropy"></p>
<p id="suggestion"></p>
<button onclick="copySuggestion()">Copy Suggestion</button>

</div>

<script>
const passwordInput = document.getElementById("password");

passwordInput.addEventListener("input", () => {
    const password = passwordInput.value;

    fetch("/analyze", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({password:password})
    })
    .then(res=>res.json())
    .then(data=>{
        let circle = document.getElementById("circle");
        circle.style.background =
            `conic-gradient(#4caf50 ${data.strength}%, #ddd ${data.strength}%)`;
        circle.innerHTML = data.strength + "%";

        document.getElementById("entropy").innerHTML =
            "Entropy Score: " + data.entropy;

        document.getElementById("suggestion").innerHTML =
            "Suggested: " + data.suggestion;

        document.getElementById("length").innerHTML =
            password.length>=8?"✔ 8+ Characters":"❌ 8+ Characters";

        document.getElementById("upper").innerHTML =
            /[A-Z]/.test(password)?"✔ Uppercase":"❌ Uppercase";

        document.getElementById("lower").innerHTML =
            /[a-z]/.test(password)?"✔ Lowercase":"❌ Lowercase";

        document.getElementById("number").innerHTML =
            /[0-9]/.test(password)?"✔ Number":"❌ Number";

        document.getElementById("special").innerHTML =
            /[^A-Za-z0-9]/.test(password)?"✔ Special Character":"❌ Special Character";
    });
});

function copySuggestion(){
    let text = document.getElementById("suggestion").innerText.replace("Suggested: ","");
    navigator.clipboard.writeText(text);
    alert("Copied!");
}
</script>

</body>
</html>
