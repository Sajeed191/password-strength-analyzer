<!DOCTYPE html>
<html>
<head>
    <title>Password Strength Checker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 350px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 15px;
            padding: 10px;
            width: 100%;
            border: none;
            background: #667eea;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }

        #result {
            margin-top: 15px;
            font-weight: bold;
        }

        .toggle {
            margin-top: 10px;
            cursor: pointer;
            font-size: 14px;
            color: #667eea;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Password Strength Checker</h2>

    <form method="POST">
        <input type="password" name="password" id="password" placeholder="Enter password" required>
        
        <div class="toggle" onclick="togglePassword()">Show / Hide Password</div>

        <button type="submit">Check</button>
    </form>

    <div id="result">
        {{ result }}
    </div>
</div>

<script>
function togglePassword() {
    var x = document.getElementById("password");
    if (x.type === "password") {
        x.type = "text";
    } else {
        x.type = "password";
    }
}
</script>

</body>
</html>
