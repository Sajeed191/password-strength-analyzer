<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SecureVault - Password Analyzer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.08);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        h1 {
            margin-bottom: 20px;
            font-size: 28px;
        }

        p {
            margin-bottom: 30px;
            opacity: 0.8;
        }

        a {
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: bold;
            margin: 5px;
            display: inline-block;
            transition: 0.3s ease;
        }

        .btn-primary {
            background: #00c6ff;
            color: white;
        }

        .btn-primary:hover {
            background: #0072ff;
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid white;
            color: white;
        }

        .btn-secondary:hover {
            background: white;
            color: #203a43;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🔐 SecureVault</h1>
    <p>Professional Password Strength Analyzer & Generator</p>

    <a href="/register" class="btn-primary">Register</a>
    <a href="/login" class="btn-secondary">Login</a>
</div>

</body>
</html>
