<!DOCTYPE html>
<html>
<head>
<title>SecureAI Mobile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(-45deg, #667eea, #764ba2, #6a11cb, #2575fc);
    background-size: 400% 400%;
    animation: gradientMove 10s ease infinite;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

@keyframes gradientMove {
    0% {background-position:0% 50%}
    50% {background-position:100% 50%}
    100% {background-position:0% 50%}
}

/* Mobile App Container */
.phone {
    width:360px;
    height:700px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(20px);
    border-radius:40px;
    padding:25px;
    box-shadow: 0 40px 80px rgba(0,0,0,0.4);
    transform-style: preserve-3d;
    transition: transform 0.2s ease;
}

/* 3D Tilt Effect */
.phone:hover {
    transform: rotateY(8deg) rotateX(5deg);
}

.header {
    text-align:center;
    color:white;
    font-size:22px;
    font-weight:600;
}

input {
    width:100%;
    padding:14px;
    margin-top:20px;
    border-radius:15px;
    border:none;
    outline:none;
    font-size:16px;
}

/* Circular Progress */
.circle-container {
    display:flex;
    justify-content:center;
    align-items:center;
    margin-top:30px;
}

.circle {
    width:140px;
    height:140px;
    border-radius:50%;
    background:conic-gradient(#00ffcc 0%, rgba(255,255,255,0.2) 0%);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:24px;
    color:white;
    font-weight:bold;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    transition:0.4s ease;
}

.checklist {
    margin-top:25px;
    color:white;
    font-size:14px;
}

.item {
    margin-top:8px;
    transition:0.3s;
}

.entropy, .suggestion {
    margin-top:15px;
    color:white;
    font-size:14px;
}

button {
    width:100%;
    padding:12px;
    margin-top:15px;
    border-radius:15px;
    border:none;
    background:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover {
    transform: scale(1.05);
}
</style>
</head>

<body>

<div class="phone">
    <div class="header">SecureAI 3D 🔐</div>

    <input type="password" id="password" placeholder="Enter Password">

    <div class="circle-container">
        <div class="circle" id="circle">0%</div>
    </div>

    <div class="checklist">
        <div class="item" id="length">❌ 8+ Characters</div>
        <div class="item" id="upper">❌ Uppercase</div>
        <div class="item" id="lower">❌ Lowercase</div>
        <div class="item" id="number">❌ Number</div>
        <div class="item" id="special">❌ Special Character</div>
    </div>

    <div class="entropy" id="entropy"></div>
    <div class="suggestion" id="suggestion"></div>

    <button onclick="copySuggestion()">Copy Suggested Password</button>
</div>

<script>
const passwordInput = document.getElementById("password");

passwordInput.addEventListener("input", () => {
    const password = passwordInput.value;

    fetch("/analyze", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({password:password})
    })
    .then(res=>res.json())
    .then(data=>{
        const circle = document.getElementById("circle");
        circle.style.background =
            `conic-gradient(#00ffcc ${data.strength}%, rgba(255,255,255,0.2) ${data.strength}%)`;
        circle.innerHTML = data.strength + "%";

        document.getElementById("entropy").innerHTML =
            "Entropy Score: " + data.entropy;

        document.getElementById("suggestion").innerHTML =
            "Suggested: " + data.suggestion;

        document.getElementById("length").innerHTML =
            password.length>=8?"✔ 8+ Characters":"❌ 8+ Characters";

        document.getElementById("upper").innerHTML =
            /[A-Z]/.test(password)?"✔ Uppercase":"❌ Uppercase";

        document.getElementById("lower").innerHTML =
            /[a-z]/.test(password)?"✔ Lowercase":"❌ Lowercase";

        document.getElementById("number").innerHTML =
            /[0-9]/.test(password)?"✔ Number":"❌ Number";

        document.getElementById("special").innerHTML =
            /[^A-Za-z0-9]/.test(password)?"✔ Special Character":"❌ Special Character";
    });
});

function copySuggestion(){
    let text = document.getElementById("suggestion").innerText.replace("Suggested: ","");
    navigator.clipboard.writeText(text);
    alert("Copied!");
}
</script>

</body>
</html>
