<!DOCTYPE html>
<html>
<head>
<title>CyberShield Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f2027;
    color: white;
    transition: 0.4s;
}

.light-mode {
    background: #f4f4f4;
    color: black;
}

.container {
    max-width: 500px;
    margin: auto;
    padding: 20px;
    text-align: center;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    margin-top: 10px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

.analyze { background: cyan; }
.generate { background: limegreen; }

.bar {
    height: 20px;
    background: gray;
    border-radius: 10px;
    margin-top: 15px;
}

.fill {
    height: 100%;
    width: 0%;
    border-radius: 10px;
    transition: 0.5s;
}

.spinner {
    display: none;
    margin-top: 10px;
}

.toggle-mode {
    margin-top: 10px;
    cursor: pointer;
}

.stats {
    margin-top: 20px;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="container">
<h2>CyberShield Pro 🔐</h2>

<input type="password" id="password" placeholder="Enter Password">
<button class="analyze" onclick="checkPassword()">Analyze</button>
<button class="generate" onclick="generatePassword()">Generate Ultra Password</button>

<div class="spinner" id="spinner">Checking...</div>

<div class="bar">
    <div class="fill" id="strengthBar"></div>
</div>

<div id="result"></div>
<div id="breach"></div>

<div class="stats">
Total Checks: <span id="total">0</span><br>
Weak Passwords: <span id="weak">0</span>
</div>

<div class="toggle-mode" onclick="toggleMode()">🌗 Toggle Dark/Light Mode</div>

</div>

<script>

function toggleMode(){
    document.body.classList.toggle("light-mode");
}

function checkPassword(){

    let password = document.getElementById("password").value;

    document.getElementById("spinner").style.display = "block";

    fetch("/check", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({password: password})
    })
    .then(res => res.json())
    .then(data => {

        document.getElementById("spinner").style.display = "none";

        let bar = document.getElementById("strengthBar");
        bar.style.width = data.strength + "%";

        bar.style.background =
            data.strength < 40 ? "red" :
            data.strength < 60 ? "orange" :
            data.strength < 80 ? "yellow" : "lime";

        document.getElementById("result").innerHTML =
            "Strength: " + data.level + " (" + data.strength + "%)";

        document.getElementById("breach").innerHTML =
            data.breach_count > 0 ?
            "⚠ Found in breaches " + data.breach_count + " times" :
            "✅ Not found in breaches";

        document.getElementById("total").innerHTML = data.total_checks;
        document.getElementById("weak").innerHTML = data.weak_passwords;
    });
}

function generatePassword(){
    fetch("/generate")
    .then(res => res.json())
    .then(data => {
        document.getElementById("password").value = data.password;
    });
}

</script>

</body>
</html>
