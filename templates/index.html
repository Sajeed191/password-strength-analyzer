<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>AI Password Strength Analyzer</title>

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="background-glow"></div>

<div class="main-card">

<h1>🔐 AI Password Security Analyzer</h1>
<p class="subtitle">Cybersecurity & Deep Learning Project</p>

<div class="input-group">

<label>Select Platform</label>

<select id="website">
<option>Amazon</option>
<option>Flipkart</option>
<option>Ajio</option>
<option>Myntra</option>
<option>Instagram</option>
</select>

</div>

<div class="input-group">

<label>Enter Password</label>

<div class="password-box">

<input type="password" id="password" placeholder="Type your password" autocomplete="new-password" autocorrect="off" autocapitalize="off" spellcheck="false">>

<span class="eye" onclick="togglePassword()">👁</span>

</div>

</div>

<button class="analyze-btn" onclick="checkPassword()">
Analyze Password
</button>

<div class="result-section">

<h3 id="strengthText">Strength : -</h3>

<div class="meter">
<div id="bar"></div>
</div>

<p id="similarity"></p>

</div>

<div class="suggestion-box">

<h3>🔑 Strong Password Suggestions</h3>

<ul id="suggestions"></ul>

</div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
