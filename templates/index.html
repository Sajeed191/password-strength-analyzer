<!DOCTYPE html>
<html>
<head>
    <title>Password Strength Checker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            margin-top: 100px;
        }

        .container {
            background: white;
            width: 400px;
            margin: auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input[type="text"] {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #007BFF;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }

        .weak {
            color: red;
        }

        .medium {
            color: orange;
        }

        .strong {
            color: green;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Password Strength Checker</h2>

        <form action="/check" method="POST">
            <input type="text" name="password" placeholder="Enter your password" required>
            <br>
            <button type="submit">Check</button>
        </form>

        {% if result %}
            <div class="result 
                {% if result == 'Weak' %}weak
                {% elif result == 'Medium' %}medium
                {% else %}strong
                {% endif %}">
                Password Strength: {{ result }}
            </div>
        {% endif %}
    </div>

</body>
</html>
