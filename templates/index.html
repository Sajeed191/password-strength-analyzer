<!DOCTYPE html>
<html>
<head>
    <title>Cyber Password Analyzer</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 15px;
            width: 400px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(0,255,255,0.5);
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 8px;
            border: none;
        }

        .eye {
            cursor: pointer;
            margin-top: 5px;
            display: inline-block;
        }

        .bar {
            height: 15px;
            background: grey;
            border-radius: 10px;
            margin-top: 10px;
        }

        .fill {
            height: 100%;
            width: 0%;
            border-radius: 10px;
            transition: 0.5s;
        }

        .result {
            margin-top: 10px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            border-radius: 8px;
            border: none;
            background: cyan;
            font-weight: bold;
            cursor: pointer;
        }

    </style>
</head>
<body>

<div class="container">
    <h2>Cyber Password Analyzer</h2>

    <input type="password" id="password" placeholder="Enter Password">
    <span class="eye" onclick="togglePassword()">👁 Show/Hide</span>

    <select id="website">
        <option value="Amazon">Amazon</option>
        <option value="Flipkart">Flipkart</option>
        <option value="Ajio">Ajio</option>
        <option value="Instagram">Instagram</option>
        <option value="Facebook">Facebook</option>
    </select>

    <button onclick="checkPassword()">Analyze</button>

    <div class="bar">
        <div class="fill" id="strengthBar"></div>
    </div>

    <div class="result" id="level"></div>
    <div class="result" id="similarity"></div>
    <div class="result" id="suggestion"></div>
</div>

<script>
function togglePassword() {
    var x = document.getElementById("password");
    x.type = x.type === "password" ? "text" : "password";
}

function checkPassword() {
    let password = document.getElementById("password").value;
    let website = document.getElementById("website").value;

    fetch("/check", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ password: password, website: website })
    })
    .then(response => response.json())
    .then(data => {
        document.getElementById("strengthBar").style.width = data.strength + "%";
        document.getElementById("strengthBar").style.background =
            data.strength < 40 ? "red" :
            data.strength < 60 ? "orange" :
            data.strength < 80 ? "yellow" : "lime";

        document.getElementById("level").innerHTML = "Strength: " + data.level + " (" + data.strength + "%)";
        document.getElementById("similarity").innerHTML =
            "Similar Password Usage on " + website + ": " + data.similarity + "%";
        document.getElementById("suggestion").innerHTML =
            "Suggested Strong Password: " + data.suggestion;
    });
}
</script>

</body>
</html>
