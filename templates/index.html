<!DOCTYPE html>
<html>
<head>
<title>CyberShield Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f2027;
    color: white;
    text-align: center;
    padding: 20px;
}
input, button {
    padding: 10px;
    width: 90%;
    max-width: 400px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
}
button { cursor: pointer; font-weight: bold; }
.bar { height: 20px; background: gray; border-radius: 10px; margin: 15px auto; max-width: 400px; }
.fill { height: 100%; width: 0%; border-radius: 10px; transition: 0.5s; }
</style>
</head>
<body>

<h2>CyberShield Pro 🔐</h2>

<input type="password" id="password" placeholder="Enter Password">
<button onclick="checkPassword()">Analyze</button>
<button onclick="generatePassword()">Generate Strong Password</button>

<div class="bar">
    <div class="fill" id="strengthBar"></div>
</div>

<div id="result"></div>
<div id="breach"></div>

<script>
function checkPassword(){
    let password = document.getElementById("password").value;

    fetch("/check", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({password: password})
    })
    .then(res => res.json())
    .then(data => {
        let bar = document.getElementById("strengthBar");
        bar.style.width = data.strength + "%";
        bar.style.background =
            data.strength < 40 ? "red" :
            data.strength < 60 ? "orange" :
            data.strength < 80 ? "yellow" : "lime";

        document.getElementById("result").innerHTML =
            "Strength: " + data.level + " (" + data.strength + "%)";

        document.getElementById("breach").innerHTML =
            data.breach_count > 0 ?
            "⚠ Found in breaches " + data.breach_count + " times" :
            "✅ Not found in breaches";
    });
}

function generatePassword(){
    fetch("/generate")
    .then(res => res.json())
    .then(data => {
        document.getElementById("password").value = data.password;
    });
}
</script>

</body>
</html>
