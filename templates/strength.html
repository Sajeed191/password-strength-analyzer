<!DOCTYPE html>
<html>

<head>

<title>Password Strength</title>

<style>

body{
background:#0f172a;
color:white;
text-align:center;
font-family:Arial;
}

input{
padding:10px;
margin:10px;
width:220px;
border:none;
border-radius:5px;
}

button{
padding:10px 20px;
background:#22c55e;
border:none;
color:white;
border-radius:5px;
}

.bar{
width:300px;
height:20px;
background:#1e293b;
margin:auto;
border-radius:10px;
}

.fill{
height:100%;
background:#22c55e;
border-radius:10px;
}

</style>

</head>

<body>

<h1>Password Strength Analyzer</h1>

<form method="POST">

<input type="password" name="password" placeholder="Enter password">

<br>

<button type="submit">Check</button>

</form>

{% if score %}

<h2>{{result}}</h2>

<div class="bar">
<div class="fill" style="width:{{score}}%"></div>
</div>

<p>{{score}}% strength</p>

{% endif %}

</body>

</html>
