<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SecureVault Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0f172a;
    color:white;
    overflow-x:hidden;
}

/* TOPBAR */
.topbar{
    height:60px;
    background:#111827;
    display:flex;
    align-items:center;
    padding:0 20px;
}

.menu-btn{
    font-size:24px;
    cursor:pointer;
}

/* SIDEBAR (Hidden by default on ALL devices) */
.sidebar{
    position:fixed;
    top:0;
    left:-260px;
    width:260px;
    height:100vh;
    background:#111827;
    padding:30px 20px;
    transition:0.4s ease;
    z-index:1001;
}

.sidebar.active{
    left:0;
}

.sidebar h2{
    margin-bottom:40px;
}

.sidebar a{
    display:block;
    padding:12px;
    margin-bottom:10px;
    text-decoration:none;
    color:#cbd5e1;
    border-radius:8px;
    transition:0.3s;
}

.sidebar a:hover{
    background:#1e293b;
    color:white;
}

/* OVERLAY */
.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    opacity:0;
    visibility:hidden;
    transition:0.3s;
    z-index:1000;
}

.overlay.active{
    opacity:1;
    visibility:visible;
}

/* MAIN CONTENT */
.main{
    padding:30px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
    gap:20px;
    margin-top:20px;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:12px;
}

.analyzer{
    margin-top:30px;
    background:#1e293b;
    padding:25px;
    border-radius:12px;
}

input{
    width:100%;
    padding:12px;
    margin-top:15px;
    border-radius:8px;
    border:none;
}

button{
    margin-top:15px;
    padding:12px;
    width:100%;
    border-radius:8px;
    border:none;
    background:#3b82f6;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
    <div class="menu-btn" onclick="openSidebar()">☰</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
    <h2>🔐 SecureVault</h2>

    <a href="#" onclick="closeSidebar()">🏠 Dashboard</a>
    <a href="#" onclick="closeSidebar()">📊 Analytics</a>
    <a href="#" onclick="closeSidebar()">👤 Profile</a>
    <a href="/logout">🚪 Logout</a>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- MAIN CONTENT -->
<div class="main">
    <h1>Welcome, {{ current_user.username }}</h1>

    <div class="cards">
        <div class="card">
            <h3>Security Score</h3>
            <p>{{ percentage if percentage else 0 }}%</p>
        </div>

        <div class="card">
            <h3>Status</h3>
            <p>{{ strength if strength else "N/A" }}</p>
        </div>
    </div>

    <div class="analyzer">
        <h2>Password Analyzer</h2>

        <form method="POST">
            <input type="text" name="password" placeholder="Enter password..." required>
            <button type="submit">Analyze</button>
        </form>
    </div>
</div>

<script>
function openSidebar(){
    document.getElementById("sidebar").classList.add("active");
    document.getElementById("overlay").classList.add("active");
}

function closeSidebar(){
    document.getElementById("sidebar").classList.remove("active");
    document.getElementById("overlay").classList.remove("active");
}
</script>

</body>
</html>
