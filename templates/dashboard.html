<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - SecureVault</title>
    <style>
        body {
            font-family: Arial;
            background: #141e30;
            background: linear-gradient(to right, #243b55, #141e30);
            color: white;
            text-align: center;
            padding-top: 50px;
        }

        input {
            padding: 10px;
            width: 300px;
        }

        button {
            padding: 10px;
        }

        .result {
            margin-top: 20px;
        }
    </style>
</head>
<body>

<h2>Welcome, {{ current_user.username }}</h2>

<form method="POST">
    <input type="text" name="password" placeholder="Enter password" required>
    <button type="submit">Analyze</button>
</form>

{% if percentage %}
<div class="result">
    <p>Strength: {{ strength }}</p>
    <p>Score: {{ percentage }}%</p>
    <p>Generated Strong Password:</p>
    <p><b>{{ generated_password }}</b></p>
</div>
{% endif %}

<br>
<a href="/logout">Logout</a>

</body>
</html>
