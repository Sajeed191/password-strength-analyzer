<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
</head>

<body>

<h1>Welcome {{ current_user.username }}</h1>

<form method="POST">

<input type="text" name="password" placeholder="Enter password to analyze">

<button type="submit">Analyze</button>

</form>

<h2>Password Strength: {{ strength }}</h2>

<h2>Score: {{ percentage }}%</h2>

<h3>Total Tests: {{ total }}</h3>

<h3>Strong Passwords: {{ strong }}</h3>

<h3>Weak Passwords: {{ weak }}</h3>

<br>

<a href="/logout">Logout</a>

</body>
</html>
