<!DOCTYPE html>
<html>
<head>

<title>Security Dashboard</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.sidebar{
height:100vh;
width:220px;
background:#020617;
position:fixed;
padding-top:20px;
}

.sidebar h2{
text-align:center;
}

.sidebar a{
display:block;
padding:15px;
color:white;
text-decoration:none;
}

.sidebar a:hover{
background:#1e293b;
}

.main{
margin-left:220px;
padding:40px;
}

.card{
background:#1e293b;
padding:20px;
margin:10px;
border-radius:10px;
display:inline-block;
width:220px;
text-align:center;
}

.generator{
margin-top:40px;
background:#1e293b;
padding:20px;
border-radius:10px;
width:400px;
}

input{
padding:10px;
border:none;
border-radius:5px;
width:70%;
}

button{
padding:10px;
background:#22c55e;
border:none;
border-radius:5px;
color:white;
cursor:pointer;
margin-left:5px;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>🔐 Security</h2>

<a href="/dashboard">Dashboard</a>
<a href="/strength">Password Analyzer</a>
<a href="/logout">Logout</a>

</div>

<div class="main">

<h1>Welcome {{user}}</h1>

<div class="card">
<h3>Account Status</h3>
<p>Secure</p>
</div>

<div class="card">
<h3>Security Level</h3>
<p>High</p>
</div>

<div class="card">
<h3>Tools</h3>
<p>Password Utilities</p>
</div>

<div class="generator">

<h2>Password Generator</h2>

<input type="text" id="passwordBox" readonly>

<button onclick="generate()">Generate</button>

<button onclick="copy()">Copy</button>

</div>

</div>

<script>

function generate(){

fetch("/generate_password")
.then(res=>res.json())
.then(data=>{
document.getElementById("passwordBox").value=data.password
})

}

function copy(){

var copyText=document.getElementById("passwordBox")

copyText.select()
document.execCommand("copy")

alert("Password copied!")

}

</script>

</body>
</html>
