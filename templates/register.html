<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <style>
        body{
            font-family: Arial;
            background:#1e1e2f;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            background:#2b2b40;
            padding:30px;
            border-radius:10px;
            width:300px;
            text-align:center;
        }

        input{
            width:90%;
            padding:10px;
            margin:10px 0;
            border:none;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:10px;
            background:#4CAF50;
            border:none;
            color:white;
            border-radius:5px;
            cursor:pointer;
        }

        a{
            color:#4da6ff;
            text-decoration:none;
        }

        a:hover{
            text-decoration:underline;
        }
    </style>

</head>

<body>

<div class="container">

<h2>Create Account</h2>

{% with messages = get_flashed_messages() %}
{% if messages %}
{% for message in messages %}
<p style="color:#ff6b6b;">{{ message }}</p>
{% endfor %}
{% endif %}
{% endwith %}

<form method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Register</button>

</form>

<br>

<p>Already have an account?  
<a href="/login">Login</a></p>

</div>

</body>
</html>
