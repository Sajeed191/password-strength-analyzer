<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>

        body{
            font-family: Arial;
            background:#f4f4f4;
        }

        .login-box{
            width:300px;
            margin:100px auto;
            padding:20px;
            background:white;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
        }

        button{
            width:100%;
            padding:10px;
            background:#007BFF;
            color:white;
            border:none;
        }

        .error{
            color:red;
        }

    </style>
</head>

<body>

<div class="login-box">

<h2>Login</h2>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<form method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
