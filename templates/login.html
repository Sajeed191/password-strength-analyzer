<!DOCTYPE html>
<html>
<head>
    <title>Login - SecureVault</title>
    <style>
        body {
            font-family: Arial;
            background: #1e3c72;
            background: linear-gradient(to right, #2a5298, #1e3c72);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .card {
            background: rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 15px;
            width: 350px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 5px;
            background: #00c6ff;
            color: white;
            font-weight: bold;
        }

        a {
            color: #00c6ff;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Login</h2>

    <form method="POST">
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <p>Don't have an account? <a href="/register">Register</a></p>
</div>

</body>
</html>
